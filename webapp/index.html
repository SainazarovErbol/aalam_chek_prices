<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Сканер штрихкода</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: var(--tg-theme-bg-color, #ffffff);
      --text: var(--tg-theme-text-color, #000000);
      --hint: var(--tg-theme-hint-color, #999999);
      --btn-bg: var(--tg-theme-button-color, #2481cc);
      --btn-text: var(--tg-theme-button-text-color, #ffffff);
      --secondary-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px 16px;
      gap: 16px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      text-align: center;
    }

    .hint {
      font-size: 14px;
      color: var(--hint);
      text-align: center;
      line-height: 1.4;
    }

    /* Контейнер камеры */
    #reader-wrap {
      width: 100%;
      max-width: 360px;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
      position: relative;
    }

    #reader {
      width: 100%;
    }

    /* Убираем лишние элементы html5-qrcode */
    #reader img { display: none !important; }
    #reader__scan_region > img { display: none !important; }

    /* Прицел поверх камеры */
    .viewfinder {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .viewfinder-box {
      width: 220px;
      height: 100px;
      border: 2px solid rgba(255,255,255,0.8);
      border-radius: 10px;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.35);
      position: relative;
    }

    /* Уголки прицела */
    .viewfinder-box::before,
    .viewfinder-box::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--btn-bg);
      border-style: solid;
    }
    .viewfinder-box::before {
      top: -2px; left: -2px;
      border-width: 3px 0 0 3px;
      border-radius: 10px 0 0 0;
    }
    .viewfinder-box::after {
      bottom: -2px; right: -2px;
      border-width: 0 3px 3px 0;
      border-radius: 0 0 10px 0;
    }

    /* Анимированная линия сканирования */
    .scan-line {
      position: absolute;
      left: 6px; right: 6px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--btn-bg), transparent);
      animation: scan 1.8s ease-in-out infinite;
      border-radius: 1px;
    }

    @keyframes scan {
      0%   { top: 10px; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: calc(100% - 12px); opacity: 0; }
    }

    /* Статус */
    #status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--hint);
      min-height: 22px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--hint);
      flex-shrink: 0;
    }

    .dot.active { background: #4cd964; animation: pulse 1s infinite; }
    .dot.found  { background: var(--btn-bg); animation: none; }
    .dot.error  { background: #ff3b30; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* Результат */
    #result-card {
      display: none;
      width: 100%;
      max-width: 360px;
      background: var(--secondary-bg);
      border-radius: 14px;
      padding: 16px;
      gap: 6px;
      flex-direction: column;
    }

    #result-card.visible { display: flex; }

    #result-barcode {
      font-size: 13px;
      color: var(--hint);
      font-family: monospace;
    }

    #result-name {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.3;
    }

    /* Кнопки */
    .btn {
      width: 100%;
      max-width: 360px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:active { opacity: 0.75; }

    .btn-primary {
      background: var(--btn-bg);
      color: var(--btn-text);
    }

    .btn-secondary {
      background: var(--secondary-bg);
      color: var(--text);
    }

    #btn-send { display: none; }
    #btn-rescan { display: none; }
  </style>
</head>
<body>

  <h1>📷 Сканер штрихкода</h1>
  <p class="hint">Наведите камеру на штрихкод товара — он определится автоматически</p>

  <div id="reader-wrap">
    <div id="reader"></div>
    <div class="viewfinder">
      <div class="viewfinder-box">
        <div class="scan-line"></div>
      </div>
    </div>
  </div>

  <div id="status">
    <div class="dot" id="dot"></div>
    <span id="status-text">Запускаю камеру...</span>
  </div>

  <div id="result-card">
    <div id="result-barcode"></div>
    <div id="result-name">Отправить штрихкод в бот?</div>
  </div>

  <button class="btn btn-primary" id="btn-send">Узнать цену</button>
  <button class="btn btn-secondary" id="btn-rescan">Сканировать снова</button>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const dot        = document.getElementById("dot");
    const statusText = document.getElementById("status-text");
    const resultCard = document.getElementById("result-card");
    const resultBarcode = document.getElementById("result-barcode");
    const resultName = document.getElementById("result-name");
    const btnSend    = document.getElementById("btn-send");
    const btnRescan  = document.getElementById("btn-rescan");

    let scanner = null;
    let lastBarcode = null;
    let scanLocked = false;

    function setStatus(text, type = "default") {
      statusText.textContent = text;
      dot.className = "dot" + (type !== "default" ? " " + type : "");
    }

    function showResult(barcode) {
      lastBarcode = barcode;
      resultBarcode.textContent = "Штрихкод: " + barcode;
      resultName.textContent = "Отправить в бот для проверки цены?";
      resultCard.classList.add("visible");
      btnSend.style.display = "block";
      btnRescan.style.display = "block";
      setStatus("Штрихкод найден", "found");
    }

    function hideResult() {
      resultCard.classList.remove("visible");
      btnSend.style.display = "none";
      btnRescan.style.display = "none";
      lastBarcode = null;
      scanLocked = false;
    }

    async function startScanner() {
      hideResult();
      setStatus("Запускаю камеру...", "default");

      if (scanner) {
        try { await scanner.stop(); } catch (_) {}
      }

      scanner = new Html5Qrcode("reader");

      const config = {
        fps: 10,
        // Узкая зона — быстрее и точнее
        qrbox: { width: 250, height: 120 },
        formatsToSupport: [
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8,
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.CODE_39,
          Html5QrcodeSupportedFormats.UPC_A,
          Html5QrcodeSupportedFormats.UPC_E,
          Html5QrcodeSupportedFormats.ITF,
        ],
      };

      try {
        await scanner.start(
          { facingMode: "environment" }, // задняя камера
          config,
          (decodedText) => {
            if (scanLocked) return;
            scanLocked = true;

            // Вибрация при успешном сканировании
            if (navigator.vibrate) navigator.vibrate(100);

            showResult(decodedText);
          },
          () => { /* тихо игнорируем ошибки кадра */ }
        );
        setStatus("Наведите на штрихкод", "active");
      } catch (err) {
        setStatus("Нет доступа к камере", "error");
        console.error(err);
      }
    }

    btnSend.addEventListener("click", () => {
      if (!lastBarcode) return;
      // Отправляем штрихкод боту и закрываем мини-приложение
      tg.sendData(lastBarcode);
    });

    btnRescan.addEventListener("click", () => {
      startScanner();
    });

    // Запускаем при загрузке
    startScanner();
  </script>
</body>
</html>
